<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js" defer></script>
    <script src="https://kit.fontawesome.com/de191e769c.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <div class="colors-container">
        <div class="color">
            <p> Color</p>
            <span class="lock-icon"></span>
        </div>
        <div class="color">
            <p> Color</p>
            <span class="lock-icon"></span>
        </div>
        <div class="color">
            <p> Color</p>
            <span class="lock-icon"></span>
        </div>
        <div class="color">
            <p> Color</p>
            <span class="lock-icon"></span>
        </div>
        <div class="color">
            <p> Color</p>
            <span class="lock-icon"></span>
        </div>
    </div>

    <div class="buttons-container">
        <div class="ctrl-btn-container">
            <i class="fa-solid fa-book-open" id="library-btn"></i>
            <p>Library</p>
        </div>
        <div class="ctrl-btn-container">
            <i class="fa-solid fa-arrows-rotate" id="generate-btn"></i>
            <p>Generate</p>
        </div>
        <div class="ctrl-btn-container">
            <i class="fa-regular fa-floppy-disk" id="save-btn"></i>
            <p>Save</p>
        </div>
    </div>
    <div class="copy-container">
        <div class="copy-popup">
            <h4>Copied to clipboard!</h4>
            <h4>&#128077;</h4>
        </div>
    </div>
    <div class="save-container">
        <div class="save-popup">
            <i class="fa-solid fa-x close-save"></i>
            <h4>Name your palette: </h4>
            <input type="text" class="save-name" placeholder="Enter palette name">
            <button type="submit" class="save-submit">Save</button>
        </div>
    </div>
</body>

</html>
